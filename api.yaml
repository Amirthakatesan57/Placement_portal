        total_students:
          type: integer
        total_companies:
          type: integer
        total_drives:
          type: integer
        total_applications:
          type: integer
        total_placements:
          type: integer
        pending_companies:
          type: integer
        pending_drives:
          type: integer
        active_drives:
          type: integer
        blacklisted_users:
          type: integer
    
    CompanyList:
      type: object

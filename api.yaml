        - sessionAuth: []
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardStats'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (not admin)
  
  /admin/companies:
    get:
      tags:
        - Admin
      summary: List All Companies
      description: Get all registered companies with search and pagination
      operationId: getAdminCompanies
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: search
          in: query
          description: Search by company name or industry
          schema:
            type: string
      responses:
        '200':
          description: List of companies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyList'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  
  /admin/companies/{id}/approve:
    post:
      tags:
        - Admin
      summary: Approve Company
      description: Approve company registration
      operationId: approveCompany
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Company ID
          schema:
            type: integer
      responses:
        '200':
          description: Company approved
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Company not found
  
  /admin/companies/{id}/blacklist:
    post:
      tags:
        - Admin
      summary: Blacklist Company
      description: Blacklist/deactivate company
      operationId: blacklistCompany
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Company blacklisted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Company not found
  
  /admin/students:
    get:
      tags:
        - Admin
      summary: List All Students
      description: Get all registered students with search
      operationId: getAdminStudents
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: search
          in: query
          description: Search by name, roll number, or branch
          schema:
            type: string
      responses:
        '200':
          description: List of students
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentList'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  
  /admin/students/{id}/blacklist:
    post:
      tags:
        - Admin
      summary: Blacklist Student
      description: Blacklist/deactivate student
      operationId: blacklistStudent
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Student blacklisted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Student not found
  
  /admin/drives:
    get:
      tags:
        - Admin
      summary: List All Drives
      description: Get all placement drives
      operationId: getAdminDrives
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [pending, approved, active, closed, rejected]
      responses:
        '200':
          description: List of drives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriveList'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  
  /admin/drives/{id}/approve:
    post:
      tags:
        - Admin
      summary: Approve Drive
      description: Approve placement drive
      operationId: approveDrive
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Drive approved
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Drive not found
  
  /admin/applications:
    get:
      tags:
        - Admin
      summary: List All Applications
      description: Get all applications across all drives
      operationId: getAdminApplications
      security:

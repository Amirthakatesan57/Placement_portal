  /student/applications:
    get:
      tags:
        - Student
      summary: My Applications
      description: Get all applications by this student
      operationId: getStudentApplications
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'

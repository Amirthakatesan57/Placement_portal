openapi: 3.0.3
info:
  title: Placement Portal Application V2 - API Documentation
  description: |
    ## Placement Portal Application V2
    
    A comprehensive campus recruitment management system built with Flask (Backend API) and Vue.js (Frontend UI).
    
    ### Features
    - **Admin Dashboard**: Manage companies, students, and placement drives
    - **Company Portal**: Create drives, review applications, schedule interviews
    - **Student Portal**: Browse jobs, apply, track application status
    - **Automated Jobs**: Interview reminders, monthly reports, CSV exports
    - **Performance**: Redis caching for API optimization
    
    ### Authentication
    All endpoints except login/register require authentication via session cookies.
    
    ### Roles
    - `admin` - Institute placement cell (highest access)
    - `company` - Registered organizations (requires admin approval)
    - `student` - Registered students (self-registration)
    
    ### Milestones
    - Milestone 0: GitHub Repository Setup
    - Milestone 1: Database Models and Schema Setup
    - Milestone 2: Authentication and Role-Based Access
    - Milestone 3: Admin Dashboard and Management
    - Milestone 4: Company Dashboard and Job/Application Management
    - Milestone 5: Student Dashboard and Job Application System
    - Milestone 6: Job Application History and Status Tracking
    - Milestone 7: Backend Jobs (Celery + Redis)
    - Milestone 8: API Performance Optimization and Caching
    
    ### Contact
    - **Course**: Modern Application Development II
    - **Institution**: Indian Institute of Technology Madras
    - **Program**: B.S. in Data Science and Applications
  
  version: 2.0.0
  contact:
    name: Placement Portal V2 Support
    email: support@placement.iitm.ac.in
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000/api
    description: Development server (local)
  - url: https://your-production-domain.com/api
    description: Production server

tags:
  - name: Authentication
    description: User login, registration, and logout endpoints
  - name: Admin
    description: Admin dashboard and management endpoints
  - name: Company
    description: Company profile, drives, and application management
  - name: Student
    description: Student profile, job applications, and placement tracking
  - name: Reports
    description: Monthly reports and analytics
  - name: Cache
    description: Cache statistics and management (Milestone 8)
  - name: Exports
    description: CSV export endpoints (Milestone 7)

paths:
  # ============================================================================
  # AUTHENTICATION ENDPOINTS
  # ============================================================================
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User Login
      description: Authenticate user and create session
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /auth/register:
    post:
      tags:
        - Authentication
      summary: User Registration
      description: Register new student or company account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid request or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User Logout
      description: End user session
      operationId: logout
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get Current User
      description: Get authenticated user profile
      operationId: getCurrentUser
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ============================================================================

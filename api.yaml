        '403':
          description: Forbidden
  
  /company/applications/{id}/status:
    put:
      tags:
        - Company
      summary: Update Application Status
      description: Update application status
      operationId: updateApplicationStatus
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [applied, shortlisted, interview, selected, rejected]
                feedback:
                  type: string
      responses:
        '200':
          description: Status updated
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Application not found
  
  /company/applications/{id}/interview:
    post:
      tags:
        - Company
      summary: Schedule Interview
      description: Schedule interview for applicant
      operationId: scheduleInterview
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterviewSchedule'
      responses:
        '200':
          description: Interview scheduled
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':

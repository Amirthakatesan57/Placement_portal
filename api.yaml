      summary: List Placements
      description: Get all placements for this company
      operationId: getCompanyPlacements
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: List of placements
          content:
            application/json:

            application/json:
              schema:
                $ref: '#/components/schemas/ReportGenerationResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  
  /admin/reports/monthly/{filename}:
    get:
      tags:
        - Reports
      summary: Download Monthly Report
      description: Download monthly report HTML file
      operationId: downloadMonthlyReport
      security:
        - sessionAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report file
          content:
            text/html:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Report not found

  # ============================================================================
  # CACHE ENDPOINTS (MILESTONE 8)
  # ============================================================================
  /admin/cache/stats:
    get:
      tags:
        - Cache
      summary: Cache Statistics
      description: Get Redis cache statistics
      operationId: getCacheStats
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Cache statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheStats'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  
  /admin/cache/clear:
    post:
      tags:
        - Cache
      summary: Clear Cache
      description: Clear all Redis cache
      operationId: clearCache
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Cache cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheClearResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Flask session cookie for authentication
  
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number
      schema:
        type: integer
        default: 1
        minimum: 1
    
    PerPageParam:
      name: per_page
      in: query
      description: Items per page
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
  
  schemas:
    # ============================================================================
    # AUTHENTICATION SCHEMAS
    # ============================================================================
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
    
    LoginResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
    
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
        - role
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [student, company]
        student_data:
          $ref: '#/components/schemas/StudentData'
        company_data:
          $ref: '#/components/schemas/CompanyData'
    
    StudentData:
      type: object
      properties:
        full_name:
          type: string
        roll_number:
          type: string
        branch:
          type: string
        year_of_study:
          type: integer
        cgpa:
          type: number
          format: float
        phone:
          type: string
        skills:
          type: string
    
    CompanyData:
      type: object
      properties:
        company_name:
          type: string
        industry:
          type: string
        location:
          type: string
        website:
          type: string
        hr_contact_name:
          type: string
        hr_contact_email:
          type: string
        hr_contact_phone:
          type: string
        company_description:
          type: string
    
    RegisterResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
        redirect_url:
          type: string
    
    LogoutResponse:
      type: object
      properties:
        message:
          type: string
    
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, company, student]
    
    UserProfile:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
    
    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: string

    # ============================================================================
    # ADMIN SCHEMAS
    # ============================================================================
    AdminDashboardStats:
      type: object
